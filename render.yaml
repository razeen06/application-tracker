services:
  - type: web
    name: application-tracker
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: flask --app app db upgrade && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EXTENSION_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Current dev/unpacked extension ID. MUST be updated (here, in the
      # Render dashboard, and in .env.example) to the new permanent ID Chrome
      # assigns once this extension is published to the Chrome Web Store --
      # see the comment in .env.example for why.
      - key: EXTENSION_ID
        value: "omfepdnjidhlachagnbielicaghjpdkm"
      - key: DATABASE_URL
        fromDatabase:
          name: application-tracker-db
          property: connectionString

databases:
  - name: application-tracker-db
    plan: free
    region: oregon
    postgresMajorVersion: "17"
