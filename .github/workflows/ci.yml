name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test suite (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apptracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/apptracker_test
      FLASK_DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run test suite against Postgres
        run: pytest tests/ -v

  migrations:
    name: Migration chain (fresh Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apptracker_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/apptracker_migrations
      FLASK_DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # This is the check that would have caught the "migration didn't
      # actually apply in production" bug we hit repeatedly: it applies
      # every migration in the chain, in order, against a Postgres database
      # that starts with zero tables -- exactly like a brand new production
      # database would. A duplicate column, a bad FK reference, an
      # out-of-order revision -- anything that breaks the chain fails this
      # step (non-zero exit) and fails the job.
      - name: Apply full migration chain from a fresh database
        run: flask --app app db upgrade
